    days: [
      { title: "Day 1 — Exam Day!", tasks: [
        {skill:"G", label:"Wake up early — give yourself plenty of time"},
        {skill:"G", label:"Eat a GOOD breakfast — no skipping, brain needs fuel"},
        {skill:"G", label:"Bring: National ID / Passport + pencils + water (if allowed)"},

      ]},
      { title: "Day 2 — Post Exam", tasks: [

      ]},
    ]
  }
];

let currentPhase = 0;
let currentWeek = 0;
let currentDay = 0;
const checked = {};

function storageKey(w, d, t) { return `ielts_w${w}_d${d}_t${t}`; }

// Provide an async-like storage API compatible with the existing code (loadChecked/toggleTask)
// Uses localStorage for persistence.
window.storage = window.storage || {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { value: v };
    } catch (e) {
      return null;
    }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      return false;
    }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return true;
    } catch (e) {
      return false;
    }
  }
};

async function loadChecked() {
  for (let w = 0; w < WEEKS.length; w++) {
    for (let d = 0; d < WEEKS[w].days.length; d++) {
      for (let t = 0; t < WEEKS[w].days[d].tasks.length; t++) {
        const k = storageKey(w, d, t);
        try {
          const r = await window.storage.get(k);
          if (r && r.value === '1') checked[k] = true;
        } catch(e) {}
      }
    }
  }
  renderAll();
}

async function toggleTask(w, d, t) {
  const k = storageKey(w, d, t);
  checked[k] = !checked[k];
  try {
    if (checked[k]) await window.storage.set(k, '1');
    else await window.storage.delete(k);
  } catch(e) {}
  renderAll();
}

function getWeekProgress(w) {
  let total = 0, done = 0;
  WEEKS[w].days.forEach((day, d) => {
    day.tasks.forEach((t, ti) => {
      total++;
      if (checked[storageKey(w, d, ti)]) done++;
    });
  });
  return {total, done, pct: total ? Math.round(done/total*100) : 0};
}

function setPhase(p) {
  currentPhase = p;
  document.querySelectorAll('.phase-btn').forEach((b,i) => b.classList.toggle('active', i===p));
  const firstWeek = WEEKS.findIndex(w => w.phase === p);
  currentWeek = firstWeek >= 0 ? firstWeek : 0;
  currentDay = 0;
  renderAll();
}

function setWeek(w) { currentWeek = w; currentDay = 0; renderAll(); }
function setDay(d) { currentDay = d; renderDay(); }

function renderAll() {
  renderStats();
  renderWeekGrid();
  renderDay();
}

function renderStats() {
  let total = 0, done = 0, fullWeeks = 0;
  WEEKS.forEach((w, wi) => {
    const p = getWeekProgress(wi);
    total += p.total; done += p.done;
    if (p.pct === 100) fullWeeks++;
  });
  document.getElementById('total-done').textContent = done;
  document.getElementById('total-pct').textContent = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('weeks-done').textContent = fullWeeks;
  document.getElementById('streak').textContent = calcStreak();
}

function calcStreak() {
  let streak = 0;
  for (let w = WEEKS.length-1; w >= 0; w--) {
    for (let d = WEEKS[w].days.length-1; d >= 0; d--) {
      const day = WEEKS[w].days[d];
      if (day.rest) continue;
      const allDone = day.tasks.every((t, ti) => checked[storageKey(w, d, ti)]);
      if (allDone && day.tasks.length > 0) streak++;
      else if (streak > 0) return streak;
    }
  }
  return streak;
}

function renderWeekGrid() {
  const filtered = WEEKS.map((w, i) => ({...w, idx: i})).filter(w => w.phase === currentPhase);
  const grid = document.getElementById('week-grid');
  grid.innerHTML = filtered.map(w => {
    const p = getWeekProgress(w.idx);
    return `<div class="week-card ${w.idx === currentWeek ? 'active' : ''}" onclick="setWeek(${w.idx})">
      <div class="week-title">${w.title}</div>
      <div class="week-sub">${w.sub}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p.pct}%"></div></div>
      <div class="prog-label">${p.done}/${p.total} tasks · ${p.pct}%</div>
    </div>`;
  }).join('');
}

function renderDay() {
  const week = WEEKS[currentWeek];
  const view = document.getElementById('day-view');
  const skillColors = {L:'badge-l', R:'badge-r', W:'badge-w', S:'badge-s', V:'badge-v', G:'badge-g'};
  const skillNames = {L:'Listening', R:'Reading', W:'Writing', S:'Speaking', V:'Vocabulary', G:'General'};

  const dayTabs = week.days.map((d, i) => {
    const allDone = d.tasks.length > 0 && d.tasks.every((t, ti) => checked[storageKey(currentWeek, i, ti)]);
    const cls = i === currentDay ? 'active' : allDone ? 'done' : d.rest ? 'rest' : '';
    return `<button class="day-btn ${cls}" onclick="setDay(${i})">${d.title.split(' — ')[0]}</button>`;
  }).join('');

  const day = week.days[currentDay];
  const doneTasks = day.tasks.filter((t, ti) => checked[storageKey(currentWeek, currentDay, ti)]).length;

  if (day.rest && day.title.includes('Rest')) {
    const taskHtml = day.tasks.map((t, ti) => {
      const k = storageKey(currentWeek, currentDay, ti);
      const isDone = !!checked[k];
      return `<div class="task-item">
        <input type="checkbox" id="t${ti}" ${isDone ? 'checked' : ''} onchange="toggleTask(${currentWeek},${currentDay},${ti})">
        <label class="task-label ${isDone ? 'checked' : ''}" for="t${ti}">
          <span class="skill-badge ${skillColors[t.skill]}">${skillNames[t.skill]}</span>
          ${t.label}
        </label>
      </div>`;
    }).join('');
    view.innerHTML = `<div class="day-tabs">${dayTabs}</div>
      <div class="day-header">
        <div class="day-title">${day.title} — ${week.title}</div>
        <div class="day-progress">${doneTasks}/${day.tasks.length} done</div>
      </div>
      <div class="task-section">
        <h4>Rest day tasks</h4>
        ${taskHtml}
      </div>`;
    return;
  }

  const groups = {};
  day.tasks.forEach((t, ti) => {
    if (!groups[t.skill]) groups[t.skill] = [];
    groups[t.skill].push({...t, ti});
  });

  const sectionsHtml = Object.entries(groups).map(([skill, tasks]) => {
    const tasksHtml = tasks.map(t => {
      const k = storageKey(currentWeek, currentDay, t.ti);
      const isDone = !!checked[k];
      return `<div class="task-item">
        <input type="checkbox" id="t${t.ti}" ${isDone ? 'checked' : ''} onchange="toggleTask(${currentWeek},${currentDay},${t.ti})">
        <label class="task-label ${isDone ? 'checked' : ''}" for="t${t.ti}">${t.label}</label>
      </div>`;
    }).join('');
    return `<div class="task-section">
      <h4><span class="skill-badge ${skillColors[skill]}">${skillNames[skill]}</span></h4>
      ${tasksHtml}
    </div>`;
  }).join('');

  view.innerHTML = `<div class="day-tabs">${dayTabs}</div>
    <div class="day-header">
      <div class="day-title">${day.title} — ${week.title}</div>
      <div class="day-progress">${doneTasks}/${day.tasks.length} done</div>
    </div>
    ${sectionsHtml}`;
}

loadChecked();
</script>
